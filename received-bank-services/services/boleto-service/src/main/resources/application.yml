server:
  port: 8081

spring:
  application:
    name: boleto-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recebimentos}
    username: ${SPRING_DATASOURCE_USERNAME:recebimentos}
    password: ${SPRING_DATASOURCE_PASSWORD:recebimentos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

app:
  aws:
    region: ${AWS_REGION:us-east-1}
  sqs:
    boleto-generation-queue-url: ${BOLETO_GENERATION_QUEUE_URL:}
    enabled: ${BOLETO_GENERATION_QUEUE_ENABLED:false}
  kafka:
    topics:
      boleto-gerado: boleto.gerado
  outbox:
    publish-delay-ms: ${OUTBOX_PUBLISH_DELAY_MS:5000}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:5}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    processing-timeout-seconds: ${OUTBOX_PROCESSING_TIMEOUT_SECONDS:120}

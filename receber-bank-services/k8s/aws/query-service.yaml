apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: recebimentos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: replace-with-ecr/query-service:1.0.0
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: recebimentos-config
          env:
            - name: RDS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: RDS_ENDPOINT
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://$(RDS_ENDPOINT):5432/recebimentos
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: MSK_BOOTSTRAP_SERVERS
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: recebimentos
spec:
  selector:
    app: query-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082

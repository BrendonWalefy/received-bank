apiVersion: apps/v1
kind: Deployment
metadata:
  name: boleto-service
  namespace: recebimentos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: boleto-service
  template:
    metadata:
      labels:
        app: boleto-service
    spec:
      containers:
        - name: boleto-service
          image: replace-with-ecr/boleto-service:1.0.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: recebimentos-config
          env:
            - name: RDS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: RDS_ENDPOINT
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://$(RDS_ENDPOINT):5432/recebimentos
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: REDIS_ENDPOINT
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: MSK_BOOTSTRAP_SERVERS
            - name: BOLETO_GENERATION_QUEUE_ENABLED
              value: "true"
            - name: BOLETO_GENERATION_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: BOLETO_GENERATION_QUEUE_URL
            - name: AWS_S3_DOCUMENTS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: recebimentos-secrets
                  key: AWS_S3_DOCUMENTS_BUCKET
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: boleto-service
  namespace: recebimentos
spec:
  selector:
    app: boleto-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
